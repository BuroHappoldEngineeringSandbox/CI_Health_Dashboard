name: Dashboard Snapshot

# Rebuilds the public fleet snapshot from the aggregated data on the dashboard-data
# branch and publishes it to gh-pages. Runs on a schedule and can be triggered
# manually to force an immediate refresh.
#
# Output: gh-pages/public/fleet.json  — fleet-wide latest status (all repos)
#         gh-pages/public/repos/*.json — per-repo summary with recent run history

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes; GitHub may delay up to ~15 min under load
  workflow_dispatch:

concurrency:
  group: dashboard-snapshot
  cancel-in-progress: true  # a newer snapshot supersedes an in-flight one

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # push to gh-pages branch

    steps:
      # Check out both data branches plus main (source of index.html) into named
      # subdirectories so we can read from one and write to another without switching.
      - name: Checkout dashboard-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: dashboard-data
          path: dashboard-data
          fetch-depth: 0  # full history needed for trend queries

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Checkout source (index.html)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: source
          fetch-depth: 1

      - name: Generate fleet snapshot
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          GENERATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p gh-pages/public/repos

          BRANCH_DIR="dashboard-data/data/branch"
          PR_DIR="dashboard-data/data/pr"
          RUNS_BASE="dashboard-data/data/runs"

          # ── Fleet overview ──────────────────────────────────────────────────
          # Build a de-duplicated set of all known repos (union of branch + pr dirs).
          ALL_REPOS=$(
            { [ -d "$BRANCH_DIR" ] && find "$BRANCH_DIR" -name '*.json' -type f | xargs -r basename -s .json; : ; } 2>/dev/null
            { [ -d "$PR_DIR"     ] && find "$PR_DIR"     -name '*.json' -type f | xargs -r basename -s .json; : ; } 2>/dev/null
          ) | sort -u

          REPOS_JSON='[]'

          if [ -n "$ALL_REPOS" ]; then
            FLEET_ENTRIES=()
            while IFS= read -r REPO; do
              BRANCH_FILE="${BRANCH_DIR}/${REPO}.json"
              PR_FILE="${PR_DIR}/${REPO}.json"

              # Branch (post-merge) is authoritative; fall back to PR-time if absent.
              if [ -f "$BRANCH_FILE" ]; then
                ENTRY=$(jq '. + {"_source":"branch"}' "$BRANCH_FILE")
              elif [ -f "$PR_FILE" ]; then
                ENTRY=$(jq '. + {"_source":"pr"}' "$PR_FILE")
              else
                continue
              fi

              FLEET_ENTRIES+=("$ENTRY")
            done <<< "$ALL_REPOS"

            if [ ${#FLEET_ENTRIES[@]} -gt 0 ]; then
              REPOS_JSON=$(printf '%s\n' "${FLEET_ENTRIES[@]}" | jq -s 'sort_by(.repository)')
            fi
          fi

          jq -n \
            --arg generated_at "$GENERATED_AT" \
            --argjson repos     "$REPOS_JSON" \
            '{generated_at: $generated_at, repos: $repos}' \
            > gh-pages/public/fleet.json

          # Copy the versioned index.html from main so gh-pages always serves
          # the latest frontend without a separate deployment step.
          cp source/index.html gh-pages/index.html

          REPO_COUNT=$(echo "$REPOS_JSON" | jq 'length')
          echo "::notice::Fleet snapshot: ${REPO_COUNT} repo(s) included."
          echo "repo_count=$REPO_COUNT" >> "$GITHUB_OUTPUT"

          # ── Per-repo summaries ──────────────────────────────────────────────
          # Combine branch + PR latest records with the last 30 run records.
          while IFS= read -r REPO; do
            BRANCH_FILE="${BRANCH_DIR}/${REPO}.json"
            PR_FILE="${PR_DIR}/${REPO}.json"

            BRANCH_DATA="null"
            PR_DATA="null"
            [ -f "$BRANCH_FILE" ] && BRANCH_DATA=$(jq '.' "$BRANCH_FILE")
            [ -f "$PR_FILE"     ] && PR_DATA=$(jq '.'     "$PR_FILE")

            # Collect the last 30 run records for this repo, most-recent first.
            RECENT_RUNS='[]'
            if [ -d "${RUNS_BASE}/${REPO}" ]; then
              RECENT_RUNS=$(find "${RUNS_BASE}/${REPO}" -name '*.json' -type f | \
                sort -r | head -30 | xargs cat | jq -s 'sort_by(.timestamp) | reverse')
            fi

            jq -n \
              --arg generated_at "$GENERATED_AT" \
              --argjson branch   "$BRANCH_DATA" \
              --argjson pr       "$PR_DATA" \
              --argjson recent   "$RECENT_RUNS" \
              '{generated_at: $generated_at, branch: $branch, pr: $pr, recent_runs: $recent}' \
              > "gh-pages/public/repos/${REPO}.json"
          done <<< "$ALL_REPOS"

      - name: Commit and push snapshot
        shell: bash
        run: |
          set -euo pipefail

          cd gh-pages

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ index.html

          if git diff --cached --quiet; then
            echo "::notice::Snapshot unchanged — no commit needed."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "snapshot: fleet update ${TIMESTAMP}"
          git push origin gh-pages
