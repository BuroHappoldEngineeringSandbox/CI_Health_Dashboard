name: Dashboard Snapshot

# Rebuilds the public fleet snapshot by querying the GitHub Check Runs API for
# each repo+branch pair listed in config/repos.json, then publishes to gh-pages.
# Runs on a schedule and can be triggered manually.
#
# Output: gh-pages/public/fleet.json          -- fleet-wide latest status
#         gh-pages/public/repos/*.json        -- per-repo+branch summaries
#
# The GitHub App (BHOM_APP_ID / BHOM_APP_PRIVATE_KEY) must be installed
# org-wide (or on every repo in config/repos.json) with:
#   checks: read
#   pull_requests: read
#   contents: read  (for org custom properties -- maturity lookup)

on:
  schedule:
    - cron: '0 7 * * *'  # daily at 07:00 UTC; trigger manually when needed sooner
  workflow_dispatch:

concurrency:
  group: dashboard-snapshot
  cancel-in-progress: true  # a newer snapshot supersedes an in-flight one

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # push to gh-pages branch

    steps:
      # App token scoped org-wide so the snapshot can read check runs and pull
      # requests from every tracked repo in config/repos.json.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id:      ${{ secrets.BHOM_APP_ID }}
          private-key: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
          owner:       BuroHappoldEngineeringSandbox

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref:         gh-pages
          path:        gh-pages
          fetch-depth: 1

      - name: Checkout source (scripts + config)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref:         main
          path:        source
          fetch-depth: 1

      - name: Generate fleet snapshot
        id: generate
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          bash source/src/snapshot/build-fleet.sh
          echo "repo_count=$(jq '.repos | length' gh-pages/public/fleet.json)" >> "$GITHUB_OUTPUT"

      - name: Copy frontend assets to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          cp source/index.html gh-pages/index.html
          mkdir -p gh-pages/styles gh-pages/scripts
          cp -r source/src/frontend/styles/. gh-pages/styles/
          cp -r source/src/frontend/scripts/. gh-pages/scripts/

      - name: Commit and push snapshot
        shell: bash
        run: |
          set -euo pipefail

          cd gh-pages

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ index.html styles/ scripts/

          if git diff --cached --quiet; then
            echo "::notice::Snapshot unchanged -- no commit needed."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "snapshot: fleet update ${TIMESTAMP}"
          git push origin gh-pages
