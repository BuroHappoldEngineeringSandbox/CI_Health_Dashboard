name: Dashboard Snapshot

# Rebuilds the public fleet snapshot from the aggregated data on the dashboard-data
# branch and publishes it to gh-pages. Runs on a schedule and can be triggered
# manually to force an immediate refresh.
#
# Output: gh-pages/public/fleet.json  — fleet-wide latest status (all repos)
#         gh-pages/public/repos/*.json — per-repo summary with recent run history

on:
  schedule:
    - cron: '0 7 * * *'  # once daily at 07:00 UTC; trigger manually via workflow_dispatch when needed sooner
  workflow_dispatch:

concurrency:
  group: dashboard-snapshot
  cancel-in-progress: true  # a newer snapshot supersedes an in-flight one

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write                       # push to gh-pages branch
      organization_custom_properties: read  # read maturity tier from org properties

    steps:
      # Check out both data branches plus main (source of index.html) into named
      # subdirectories so we can read from one and write to another without switching.
      - name: Checkout dashboard-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: dashboard-data
          path: dashboard-data
          fetch-depth: 0  # full history needed for trend queries

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Checkout source (index.html)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: source
          fetch-depth: 1

      - name: Generate fleet snapshot
        id: generate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash source/src/snapshot/build-fleet.sh
          echo "repo_count=$(jq '.repos | length' gh-pages/public/fleet.json)" >> "$GITHUB_OUTPUT"

      - name: Copy frontend assets to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          # Copy the full frontend directory from main so gh-pages always serves
          # the latest HTML, CSS, and JS without a separate deployment step.
          cp source/index.html gh-pages/index.html
          mkdir -p gh-pages/styles gh-pages/scripts
          cp -r source/src/frontend/styles/. gh-pages/styles/
          cp -r source/src/frontend/scripts/. gh-pages/scripts/

      - name: Commit and push snapshot
        shell: bash
        run: |
          set -euo pipefail

          cd gh-pages

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ index.html styles/ scripts/

          if git diff --cached --quiet; then
            echo "::notice::Snapshot unchanged — no commit needed."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "snapshot: fleet update ${TIMESTAMP}"
          git push origin gh-pages
