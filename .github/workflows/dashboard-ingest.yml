name: Dashboard Ingest

# Triggered by repository_dispatch from the emit-health job in each repo's orchestrator.
# Writes a per-run JSON record to the dashboard-data orphan branch and updates the
# latest-status file for that repo so the snapshot workflow always has fresh input.
#
# Concurrency is serialised (cancel-in-progress: false) to prevent git push conflicts
# when multiple repos emit health records simultaneously.

on:
  repository_dispatch:
    types: [ci-health-run]

concurrency:
  group: dashboard-data-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # push to dashboard-data branch

    steps:
      - name: Validate payload
        id: validate
        shell: bash
        env:
          REPOSITORY: ${{ github.event.client_payload.repository }}
          RUN_ID:     ${{ github.event.client_payload.run_id }}
        run: |
          set -euo pipefail

          # Guard against path traversal or injection via malformed payloads.
          # repository is "org/repo"; extract just the repo name for use as a filesystem path.
          if [[ ! "$REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::Invalid repository in payload: '${REPOSITORY}'"
            exit 1
          fi
          if [[ ! "$RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid run_id in payload: '${RUN_ID}'"
            exit 1
          fi

          REPO=$(echo "$REPOSITORY" | cut -d'/' -f2)
          echo "repo=$REPO"     >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout dashboard-data branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: dashboard-data
          fetch-depth: 1

      - name: Write run record
        shell: bash
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          REPO:    ${{ steps.validate.outputs.repo }}
          RUN_ID:  ${{ steps.validate.outputs.run_id }}
          TRIGGER: ${{ github.event.client_payload.trigger }}
        run: |
          set -euo pipefail

          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")

          # ── Per-run history (trigger-agnostic) ─────────────────────────────
          # One file per run — retained permanently for trend analysis.
          RUN_DIR="data/runs/${REPO}/${YEAR}/${MONTH}"
          mkdir -p "$RUN_DIR"
          echo "$PAYLOAD" | jq '.' > "${RUN_DIR}/${RUN_ID}.json"

          # ── Authoritative latest-state (split by trigger type) ─────────────
          # post-merge runs (push to develop/main) → data/branch/{repo}.json
          #   These are the source of truth for fleet health.
          # PR runs → data/pr/{repo}.json
          #   Fallback source; used only when no branch record exists yet.
          #
          # This split prevents a PR run from silently overwriting a post-merge
          # health record — the two signals are stored and queried independently.
          case "$TRIGGER" in
            push|workflow_dispatch)
              mkdir -p data/branch
              echo "$PAYLOAD" | jq '.' > "data/branch/${REPO}.json"
              ;;
            pull_request|pull_request_target)
              mkdir -p data/pr
              echo "$PAYLOAD" | jq '.' > "data/pr/${REPO}.json"
              ;;
            *)
              # Unknown trigger — write to branch as a safe default so the record
              # is not silently dropped, but log a notice for visibility.
              echo "::notice::Unrecognised trigger '${TRIGGER}' for ${REPO} — writing to data/branch/."
              mkdir -p data/branch
              echo "$PAYLOAD" | jq '.' > "data/branch/${REPO}.json"
              ;;
          esac

      - name: Commit and push
        shell: bash
        env:
          REPO:   ${{ steps.validate.outputs.repo }}
          RUN_ID: ${{ steps.validate.outputs.run_id }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          # Exit cleanly on idempotent re-delivery of the same event.
          if git diff --cached --quiet; then
            echo "::notice::No changes to commit — likely a duplicate delivery."
            exit 0
          fi

          git commit -m "ci: ingest run ${RUN_ID} (${REPO})"

          # Retry up to 3 times to handle rare concurrent-push races.
          for attempt in 1 2 3; do
            if git push origin dashboard-data; then
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — rebasing and retrying."
            git pull --rebase origin dashboard-data
          done
