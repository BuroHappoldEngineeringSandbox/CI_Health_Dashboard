name: Dashboard Ingest

# Triggered by repository_dispatch from ci-emit-health.yml in CI_Toolkit.
# Each dispatch carries a single per-workflow health record.
#
# Uses the GitHub Contents API (PUT /contents/{path}) to write files atomically —
# no git clone, no push conflicts, safe for burst emissions (many workflows firing
# at once from a single PR across multiple repos).
#
# Storage layout on the dashboard-data branch:
#   data/latest/{repo}/{workflow}.json   — latest record per workflow (not written for cancelled)
#   data/runs/{repo}/{YYYY}/{MM}/{run_id}-{workflow}.json — full history (always written)

on:
  repository_dispatch:
    types: [ci-health-run]

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Validate payload
        id: validate
        shell: bash
        env:
          REPOSITORY: ${{ github.event.client_payload.repository }}
          RUN_ID:     ${{ github.event.client_payload.run_id }}
          WORKFLOW:   ${{ github.event.client_payload.workflow }}
          STATUS:     ${{ github.event.client_payload.status }}
        run: |
          set -euo pipefail

          if [[ ! "$REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::Invalid repository: '${REPOSITORY}'"
            exit 1
          fi
          if [[ ! "$RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid run_id: '${RUN_ID}'"
            exit 1
          fi
          if [[ ! "$WORKFLOW" =~ ^[A-Za-z0-9_-]{1,60}$ ]]; then
            echo "::error::Invalid workflow name: '${WORKFLOW}'"
            exit 1
          fi
          if [[ ! "$STATUS" =~ ^(success|failure|cancelled|skipped)$ ]]; then
            echo "::error::Invalid status: '${STATUS}'"
            exit 1
          fi

          REPO=$(echo "$REPOSITORY" | cut -d'/' -f2)
          echo "repo=$REPO"         >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID"     >> "$GITHUB_OUTPUT"
          echo "workflow=$WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS"     >> "$GITHUB_OUTPUT"

      - name: Write records via Contents API
        shell: bash
        env:
          TOKEN:    ${{ github.token }}
          PAYLOAD:  ${{ toJSON(github.event.client_payload) }}
          REPO:     ${{ steps.validate.outputs.repo }}
          RUN_ID:   ${{ steps.validate.outputs.run_id }}
          WORKFLOW: ${{ steps.validate.outputs.workflow }}
          STATUS:   ${{ steps.validate.outputs.status }}
        run: |
          set -euo pipefail

          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")
          BASE_URL="https://api.github.com/repos/BuroHappoldEngineeringSandbox/CI_Health_Dashboard/contents"
          CONTENT=$(echo "$PAYLOAD" | jq -c '.' | base64 -w0)

          # GET existing file SHA — returns empty string if file does not exist yet.
          get_sha() {
            curl -fsSL \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${BASE_URL}/${1}?ref=dashboard-data" 2>/dev/null \
              | jq -r '.sha // empty'
          }

          # PUT a file. Returns HTTP status code.
          api_put() {
            local path="$1" sha="$2"
            local body
            if [ -n "$sha" ]; then
              body=$(jq -n \
                --arg content "$CONTENT" \
                --arg sha     "$sha" \
                --arg msg     "ci: ingest ${REPO}/${WORKFLOW} run ${RUN_ID}" \
                '{message: $msg, content: $content, branch: "dashboard-data", sha: $sha}')
            else
              body=$(jq -n \
                --arg content "$CONTENT" \
                --arg msg     "ci: ingest ${REPO}/${WORKFLOW} run ${RUN_ID}" \
                '{message: $msg, content: $content, branch: "dashboard-data"}')
            fi
            curl -o /dev/null -w "%{http_code}" -sSL -X PUT \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${BASE_URL}/${path}" \
              -d "$body"
          }

          # ── Full run history — unique path per run; 409 = duplicate delivery, skip ──
          RUN_PATH="data/runs/${REPO}/${YEAR}/${MONTH}/${RUN_ID}-${WORKFLOW}.json"
          STATUS_CODE=$(api_put "$RUN_PATH" "")
          if [ "$STATUS_CODE" = "409" ]; then
            echo "::notice::Run record already exists (duplicate delivery) — skipped: ${RUN_PATH}"
          elif [[ "$STATUS_CODE" != "200" && "$STATUS_CODE" != "201" ]]; then
            echo "::error::Failed to write run record (HTTP ${STATUS_CODE}): ${RUN_PATH}"
            exit 1
          else
            echo "::notice::Run record written: ${RUN_PATH}"
          fi

          # ── Latest per-workflow state — skip cancelled ──────────────────────────
          if [ "$STATUS" != "cancelled" ]; then
            LATEST_PATH="data/latest/${REPO}/${WORKFLOW}.json"
            # Retry once on 409: SHA changed between our GET and PUT (concurrent ingest)
            for attempt in 1 2; do
              SHA=$(get_sha "$LATEST_PATH")
              STATUS_CODE=$(api_put "$LATEST_PATH" "$SHA")
              if [[ "$STATUS_CODE" = "200" || "$STATUS_CODE" = "201" ]]; then
                echo "::notice::Latest record written: ${LATEST_PATH}"
                break
              elif [ "$STATUS_CODE" = "409" ] && [ "$attempt" = "1" ]; then
                echo "::warning::SHA conflict on latest record — retrying with fresh SHA."
              else
                echo "::error::Failed to write latest record (HTTP ${STATUS_CODE}): ${LATEST_PATH}"
                exit 1
              fi
            done
          else
            echo "::notice::Status is cancelled — latest record not overwritten."
          fi


