name: Dashboard Ingest

# Triggered by repository_dispatch from ci-emit-health.yml in CI_Toolkit.
# Each dispatch carries a single per-workflow health record.
#
# Storage layout on the dashboard-data branch:
#   data/latest/{repo}/{workflow}.json   — latest record per workflow (not written for cancelled)
#   data/runs/{repo}/{YYYY}/{MM}/{run_id}-{workflow}.json — full history (always written)
#
# Concurrency is serialised to prevent git push conflicts when multiple
# repos emit records simultaneously.

on:
  repository_dispatch:
    types: [ci-health-run]

concurrency:
  group: dashboard-data-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Validate payload
        id: validate
        shell: bash
        env:
          REPOSITORY: ${{ github.event.client_payload.repository }}
          RUN_ID:     ${{ github.event.client_payload.run_id }}
          WORKFLOW:   ${{ github.event.client_payload.workflow }}
          STATUS:     ${{ github.event.client_payload.status }}
        run: |
          set -euo pipefail

          if [[ ! "$REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::Invalid repository: '${REPOSITORY}'"
            exit 1
          fi
          if [[ ! "$RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid run_id: '${RUN_ID}'"
            exit 1
          fi
          if [[ ! "$WORKFLOW" =~ ^[A-Za-z0-9_-]{1,60}$ ]]; then
            echo "::error::Invalid workflow name: '${WORKFLOW}'"
            exit 1
          fi
          if [[ ! "$STATUS" =~ ^(success|failure|cancelled|skipped)$ ]]; then
            echo "::error::Invalid status: '${STATUS}'"
            exit 1
          fi

          REPO=$(echo "$REPOSITORY" | cut -d'/' -f2)
          echo "repo=$REPO"         >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID"     >> "$GITHUB_OUTPUT"
          echo "workflow=$WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS"     >> "$GITHUB_OUTPUT"

      - name: Checkout dashboard-data branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: dashboard-data
          fetch-depth: 1

      - name: Write records
        shell: bash
        env:
          PAYLOAD:  ${{ toJSON(github.event.client_payload) }}
          REPO:     ${{ steps.validate.outputs.repo }}
          RUN_ID:   ${{ steps.validate.outputs.run_id }}
          WORKFLOW: ${{ steps.validate.outputs.workflow }}
          STATUS:   ${{ steps.validate.outputs.status }}
        run: |
          set -euo pipefail

          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")

          # ── Full run history — always written ───────────────────────────────
          RUN_DIR="data/runs/${REPO}/${YEAR}/${MONTH}"
          mkdir -p "$RUN_DIR"
          echo "$PAYLOAD" | jq '.' > "${RUN_DIR}/${RUN_ID}-${WORKFLOW}.json"

          # ── Latest per-workflow state — skip cancelled so a cancellation ────
          # does not overwrite a previously good or failed record.
          if [ "$STATUS" != "cancelled" ]; then
            LATEST_DIR="data/latest/${REPO}"
            mkdir -p "$LATEST_DIR"
            echo "$PAYLOAD" | jq '.' > "${LATEST_DIR}/${WORKFLOW}.json"
          else
            echo "::notice::Status is cancelled — latest record not overwritten."
          fi

      - name: Commit and push
        shell: bash
        env:
          REPO:     ${{ steps.validate.outputs.repo }}
          RUN_ID:   ${{ steps.validate.outputs.run_id }}
          WORKFLOW: ${{ steps.validate.outputs.workflow }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "::notice::No changes to commit — likely a duplicate delivery."
            exit 0
          fi

          git commit -m "ci: ingest ${REPO}/${WORKFLOW} run ${RUN_ID}"

          for attempt in 1 2 3; do
            if git push origin dashboard-data; then
              break
            fi
            echo "::warning::Push attempt ${attempt} failed — rebasing and retrying."
            git pull --rebase origin dashboard-data
          done

