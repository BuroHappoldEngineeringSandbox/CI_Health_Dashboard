name: Initialize Dashboard Branches

# One-time setup workflow. Run this manually after the repository is created
# to initialize the two orphan branches the dashboard depends on:
#
#   dashboard-data  — receives per-run health records from emit-health dispatches
#   gh-pages        — serves the compiled fleet snapshot via GitHub Pages
#
# Safe to re-run: existing branches are detected and skipped.
# After running, enable GitHub Pages in repository Settings → Pages,
# pointing to the gh-pages branch, / (root).

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Initialize dashboard-data branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          if gh api "repos/${REPO}/branches/dashboard-data" > /dev/null 2>&1; then
            echo "::notice::dashboard-data branch already exists — skipping."
          else
            echo "::notice::Creating dashboard-data orphan branch…"

            # Create an empty tree (no files — data/ is created by the ingest workflow).
            EMPTY_TREE=$(gh api -X POST "repos/${REPO}/git/trees" \
              --input - <<'EOF' --jq '.sha'
{"tree":[{"path":"data/.gitkeep","mode":"100644","type":"blob","content":""}]}
EOF
)

            # Orphan commit: no parent array.
            COMMIT_SHA=$(gh api -X POST "repos/${REPO}/git/commits" \
              -f message="Initialize dashboard-data branch" \
              -f "tree=${EMPTY_TREE}" \
              --jq '.sha')

            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/heads/dashboard-data" \
              -f sha="$COMMIT_SHA"

            echo "::notice::dashboard-data branch created (${COMMIT_SHA:0:7})."
          fi

      - name: Initialize gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          if gh api "repos/${REPO}/branches/gh-pages" > /dev/null 2>&1; then
            echo "::notice::gh-pages branch already exists — skipping."
          else
            echo "::notice::Creating gh-pages orphan branch…"

            # Seed with an empty fleet.json so Pages can be enabled immediately
            # before the first snapshot has run.
            SEED_CONTENT=$(echo '{"generated_at":null,"repos":[]}' | base64 -w0)

            BLOB_SHA=$(gh api -X POST "repos/${REPO}/git/blobs" \
              -f content="$SEED_CONTENT" \
              -f encoding="base64" \
              --jq '.sha')

            TREE_SHA=$(gh api -X POST "repos/${REPO}/git/trees" \
              --input - <<EOF --jq '.sha'
{"tree":[{"path":"public/fleet.json","mode":"100644","type":"blob","sha":"${BLOB_SHA}"}]}
EOF
)

            COMMIT_SHA=$(gh api -X POST "repos/${REPO}/git/commits" \
              -f message="Initialize gh-pages branch" \
              -f "tree=${TREE_SHA}" \
              --jq '.sha')

            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/heads/gh-pages" \
              -f sha="$COMMIT_SHA"

            echo "::notice::gh-pages branch created (${COMMIT_SHA:0:7})."
            echo "::notice::Enable GitHub Pages: Settings → Pages → Branch: gh-pages, Folder: / (root)."
          fi
